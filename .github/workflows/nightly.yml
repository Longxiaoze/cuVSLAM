name: Nightly Build & Test
run-name: "${{ github.event_name == 'schedule' && 'Nightly' || startsWith(github.ref, 'refs/heads/release/') && 'Release candidate' || 'Manual build' }} · ${{ github.ref_name }}"

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        type: boolean
        default: false
        description: 'Force build even without recent changes'

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EVAL_KPIS_ARTIFACT: eval-kpis-staging
  EVAL_REPORT_ARTIFACT: eval-reports-staging
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  S3_DATASETS_BUCKET: ${{ vars.S3_DATASETS_BUCKET }}

jobs:
  check-changes:
    name: Check for recent changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      is_release: ${{ steps.decide.outputs.is_release }}
      release_tag: ${{ steps.decide.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect commits in the last 24 hours
        id: decide
        shell: bash
        env:
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
        run: |
          set -euo pipefail
          COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          FORCE="${FORCE_BUILD:-false}"
          IS_RELEASE=false
          RELEASE_TAG=""

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [[ "$GITHUB_REF_NAME" == release/* ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
            RELEASE_TAG="${RELEASE_TAG#release/}"
            if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z]+)*$ ]]; then
              echo "::error::Release branch must be named release/vMAJOR.MINOR[.PATCH][-SUFFIX] (got '$GITHUB_REF_NAME')."
              exit 1
            fi
            IS_RELEASE=true
          fi

          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          if [ "${COMMIT_COUNT}" -gt 0 ] || [ "${FORCE}" = "true" ] || [ "$IS_RELEASE" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Building: ${COMMIT_COUNT} commit(s) in last 24h, force=${FORCE}, release=${IS_RELEASE}"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: no commits in last 24h, force=${FORCE}, release=${IS_RELEASE}"
          fi

  build-and-test:
    name: "${{ matrix.name }}"
    needs: check-changes
    if: needs.check-changes.outputs.should_build == 'true'
    runs-on: ${{ fromJSON(matrix.runner) }}
    timeout-minutes: ${{ matrix.job_timeout || 120 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 configs (CUDA/Ubuntu controlled by Docker build args)
          - { name: "x86_64 / cuda-12.6 / ubuntu-22.04", runner: '["gpu"]', cuda: "12.6.3", ubuntu: "22.04", archs: "75;80;86;89;90", platform: "x86_64", wheel: true, eval: true, docs: true }
          - { name: "x86_64 / cuda-12.6 / ubuntu-24.04", runner: '["gpu"]', cuda: "12.6.3", ubuntu: "24.04", archs: "75;80;86;89;90", platform: "x86_64", wheel: true, eval: true }
          - { name: "x86_64 / cuda-13.2 / ubuntu-22.04", runner: '["gpu"]', cuda: "13.2.0", ubuntu: "22.04", archs: "75;80;86;89;100;120;121", platform: "x86_64", wheel: true, eval: true }
          - { name: "x86_64 / cuda-13.2 / ubuntu-24.04", runner: '["gpu"]', cuda: "13.2.0", ubuntu: "24.04", archs: "75;80;86;89;100;120;121", platform: "x86_64", wheel: true, eval: true }

          # Non-default CMake configuration smoke build: builds + tests + wheel with extra
          # cmake_options, but skips eval/docs and uploads no artifacts (skip_artifacts).
          # Add another such row to cover a different option set (e.g. USE_CUDA).
          - { name: "x86_64 / USE_RERUN (config smoke)", runner: '["gpu"]', cuda: "12.6.3", ubuntu: "24.04", archs: "75;80;86;89;90", platform: "x86_64-rerun", wheel: true, cmake_options: "-DUSE_RERUN=ON", skip_artifacts: true }

          # Jetson configs (CUDA version must match host JetPack driver)
          # Orin uses base_image override; cuda value is not used for the Docker base but kept for artifact naming
          - { name: "aarch64 / Orin (JP 6.1)",  runner: '["jetson-orin"]', cuda: "12.6.3", ubuntu: "22.04", archs: "87",  platform: "orin",  wheel: true, base_image: "nvcr.io/nvidia/12.6.11-devel:12.6.11-devel-aarch64-ubuntu22.04" }
          - { name: "aarch64 / Thor (JP 7.1)",  runner: '["jetson-thor"]', cuda: "13.0.1", ubuntu: "24.04", archs: "110", platform: "thor",  wheel: true, retries: 3, build_timeout: 60, job_timeout: 180 }
    steps:
      - name: Verify GPU
        run: nvidia-smi

      - uses: actions/checkout@v5
        with:
          lfs: false

      - name: Configure Ubuntu Ports mirror
        if: matrix.platform == 'orin' || matrix.platform == 'thor'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dockerfile = Path("scripts/Dockerfile")
          marker = "ARG DEBIAN_FRONTEND=noninteractive\n"
          mirror_setup = r"""ARG DEBIAN_FRONTEND=noninteractive

          # NVIDIA ARM runner networks cannot reliably reach ports.ubuntu.com.
          RUN set -eux; \
              find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) \
                  -exec sed -Ei 's#https?://ports\.ubuntu\.com/ubuntu-ports#http://mirrors.ocf.berkeley.edu/ubuntu-ports#g' {} +; \
              printf '%s\n' \
                  'Acquire::IndexTargets::deb::DEP-11::DefaultEnabled "false";' \
                  'Acquire::IndexTargets::deb::DEP-11-icons-small::DefaultEnabled "false";' \
                  'Acquire::IndexTargets::deb::DEP-11-icons::DefaultEnabled "false";' \
                  'Acquire::IndexTargets::deb::DEP-11-icons-hidpi::DefaultEnabled "false";' \
                  > /etc/apt/apt.conf.d/99-nvidia-ubuntu-ports-mirror
          """

          content = dockerfile.read_text()
          if marker not in content:
              raise SystemExit(f"{marker.strip()} not found in {dockerfile}")
          dockerfile.write_text(content.replace(marker, mirror_setup, 1))
          PY

      - name: Pull LFS test data
        run: git lfs pull --include="test_data/"

      - name: Resolve runner storage root
        if: matrix.eval && vars.RUNNER_STORAGE_ROOT != ''
        run: echo "RUNNER_STORAGE_ROOT=${{ vars.RUNNER_STORAGE_ROOT }}" >> "$GITHUB_ENV"

      - name: Resolve local datasets root
        if: matrix.eval
        run: echo "RUNNER_LOCAL_DATASETS_ROOT=${{ vars.RUNNER_LOCAL_DATASETS_ROOT || '$HOME/.cache/cuvslam' }}" >> "$GITHUB_ENV"

      - name: Build CI tools image
        if: matrix.eval
        env:
          AWS_CLI_PUBLIC_KEY: ${{ vars.AWS_CLI_PUBLIC_KEY }}
        run: |
          keyfile="$RUNNER_TEMP/aws-cli-public-key.asc"
          if [ -z "${AWS_CLI_PUBLIC_KEY:-}" ]; then
            echo "AWS_CLI_PUBLIC_KEY repository variable is not configured" >&2
            exit 1
          fi
          printf '%s\n' "$AWS_CLI_PUBLIC_KEY" > "$keyfile"
          DOCKER_BUILDKIT=1 docker build -f scripts/Dockerfile.ci . --network host --tag cuvslam-ci:local \
            --secret id=aws_cli_public_key,src="$keyfile"

      - name: Verify eval prerequisites
        if: matrix.eval
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_RO_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_RO_SECRET_ACCESS_KEY }}
        run: |
          docker run --rm --network host \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_DEFAULT_REGION -e S3_DATASETS_BUCKET \
            -e RUNNER_STORAGE_ROOT -e RUNNER_LOCAL_DATASETS_ROOT \
            -v "$(pwd):/cuvslam:ro" \
            -v "$RUNNER_LOCAL_DATASETS_ROOT:$RUNNER_LOCAL_DATASETS_ROOT" \
            -w /cuvslam \
            cuvslam-ci:local ./scripts/check_eval_prerequisites.sh

      - name: Stage eval datasets
        if: matrix.eval
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_RO_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_RO_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p "$RUNNER_LOCAL_DATASETS_ROOT"
          docker run --rm --network host \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_DEFAULT_REGION -e S3_DATASETS_BUCKET \
            -e RUNNER_LOCAL_DATASETS_ROOT \
            -v "$(pwd):/cuvslam:ro" \
            -v "$RUNNER_LOCAL_DATASETS_ROOT:$RUNNER_LOCAL_DATASETS_ROOT" \
            -w /cuvslam \
            cuvslam-ci:local ./scripts/stage_eval_datasets.sh

      - name: Build C++ libraries
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ matrix.retries || 1 }}
          timeout_minutes: ${{ matrix.build_timeout || 120 }}
          retry_wait_seconds: 30
          command: |
            CUDA_VERSION=${{ matrix.cuda }} \
            UBUNTU_VERSION=${{ matrix.ubuntu }} \
            BASE_IMAGE="${{ matrix.base_image }}" \
            EXTRA_CMAKE_ARGS="-DCMAKE_CUDA_ARCHITECTURES=${{ matrix.archs }} ${{ matrix.cmake_options }}" \
            ./scripts/build_cuvslam_in_docker.sh Release ./output

      - name: Run C++ tests
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ matrix.retries || 1 }}
          timeout_minutes: 30
          retry_wait_seconds: 30
          command: ./scripts/test_cuvslam_in_docker.sh ./output

      - name: Build Python wheel
        if: matrix.wheel
        run: |
          CUDA_VERSION=${{ matrix.cuda }} \
          UBUNTU_VERSION=${{ matrix.ubuntu }} \
          ./scripts/build_pycuvslam_in_docker.sh ./output

      - name: Verify Python wheel installs
        if: matrix.wheel
        run: ./scripts/verify_pycuvslam_wheel_in_docker.sh ./output

      - name: Run Python tests
        uses: nick-fields/retry@v3
        with:
          max_attempts: ${{ matrix.retries || 1 }}
          timeout_minutes: 30
          retry_wait_seconds: 30
          command: ./scripts/test_pycuvslam_in_docker.sh ./output

      - name: Generate test summary
        if: always() && !matrix.skip_artifacts
        run: |
          CONFIG="${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}"
          python3 scripts/junit-to-markdown.py "$CONFIG" C++ output/cpp-test-results.xml > output/test-summary.txt
          python3 scripts/junit-to-markdown.py "$CONFIG" Python output/python-test-output.txt >> output/test-summary.txt

      - name: Build documentation
        if: matrix.docs
        run: ./scripts/build_docs_in_docker.sh ./output

      - name: Upload documentation
        if: always() && matrix.docs
        uses: actions/upload-artifact@v7
        with:
          name: docs-html
          path: output/docs/
          retention-days: 30
          if-no-files-found: warn

      - name: Run cuVSLAM evaluation
        if: matrix.eval
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_S3_RO_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_RO_SECRET_ACCESS_KEY }}
        run: |
          RUN_ID="$(date -u +%Y-%m-%d)" \
          KPI_HISTORY_DIR="${RUNNER_STORAGE_ROOT:?RUNNER_STORAGE_ROOT must be set}/cuvslam-ci/kpi-history/${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}" \
          ./scripts/eval_cuvslam_in_docker.sh ./output

      - name: Upload KPI results
        if: always() && matrix.eval
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.EVAL_KPIS_ARTIFACT }}-${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: |
            output/eval/kpi_*.json
            output/eval/kpi_*.json.table
            output/eval/kpi_*.json.drift
          retention-days: 1
          if-no-files-found: warn

      - name: Upload eval PDF reports for aggregation
        if: always() && matrix.eval
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.EVAL_REPORT_ARTIFACT }}-${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/eval/stats/**/report_*.pdf
          retention-days: 1
          if-no-files-found: warn

      - name: Upload test results
        if: always() && !matrix.skip_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: |
            output/cpp-test-results.xml
            output/python-test-output.txt
            output/test-summary.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload C++ libraries
        if: always() && !matrix.skip_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cuvslam-${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/build/bin/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Python wheel
        if: always() && matrix.wheel && !matrix.skip_artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pycuvslam-${{ matrix.platform }}-cuda${{ matrix.cuda }}-ubuntu${{ matrix.ubuntu }}
          path: output/wheel/*.whl
          retention-days: 30
          if-no-files-found: warn

  nightly-summary:
    name: Build status & summary
    runs-on: ubuntu-latest
    if: always()
    needs: [check-changes, build-and-test]
    permissions:
      actions: write  # Required by github.rest.actions.deleteArtifact below.
      contents: read
    steps:
      - name: Download test result artifacts
        if: needs.check-changes.outputs.should_build == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          path: artifacts/test-results

      - name: Download KPI staging artifacts
        if: needs.check-changes.outputs.should_build == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.EVAL_KPIS_ARTIFACT }}-*
          path: artifacts/kpis

      - name: Download evaluation report staging artifacts
        if: needs.check-changes.outputs.should_build == 'true'
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ env.EVAL_REPORT_ARTIFACT }}-*
          path: artifacts/eval-reports

      - name: Build combined summary
        id: aggregate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p consolidated/kpis consolidated/eval-reports
          REPORT=consolidated/summary.md

          {
            echo "# cuVSLAM CI Summary"
            echo ""
            echo "- Trigger: \`$GITHUB_EVENT_NAME\`"
            echo "- Ref: \`$GITHUB_REF_NAME\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Matrix result: \`${{ needs.build-and-test.result }}\`"
            echo "- [Workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
          } > "$REPORT"

          if [ "${{ needs.check-changes.result }}" != "success" ]; then
            {
              echo "The preflight job failed before the build decision could be made."
              echo ""
            } >> "$REPORT"
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ needs.check-changes.outputs.should_build }}" != "true" ]; then
            {
              echo "Nightly skipped because there were no commits in the last 24 hours and the build was not forced."
              echo ""
            } >> "$REPORT"
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "## Test Results"
            echo ""
            echo "| Status | Configuration | Language | Total | Passed | Failed | Errors | Skipped |"
            echo "|:------:|---------------|----------|------:|-------:|-------:|-------:|--------:|"
          } >> "$REPORT"

          for summary in artifacts/test-results/*/test-summary.txt; do
            [ -f "$summary" ] || continue
            while IFS='|' read -r status config language total passed failed errors skipped _details; do
              case "$status" in
                pass) icon="PASS" ;;
                fail) icon="FAIL" ;;
                *) icon="NO RESULTS" ;;
              esac
              echo "| $icon | $config | $language | $total | $passed | $failed | $errors | $skipped |" >> "$REPORT"
            done < "$summary"
          done
          echo "" >> "$REPORT"

          # Merge every config's KPI table into one, prefixed with a Config column
          # (platform-cuda-ubuntu slug) so rows stay distinct and reports never overwrite.
          kpi_emit_head=1
          kpi_config_count=0
          for kpidir in artifacts/kpis/${EVAL_KPIS_ARTIFACT}-*; do
            [ -d "$kpidir" ] || continue
            CONFIG=${kpidir#artifacts/kpis/${EVAL_KPIS_ARTIFACT}-}
            mkdir -p "consolidated/kpis/$CONFIG"
            cp -a "$kpidir"/. "consolidated/kpis/$CONFIG/"
            KPI_TABLE=$(find "$kpidir" -name "kpi_*.json.table" -print -quit 2>/dev/null || true)
            [ -f "$KPI_TABLE" ] || continue
            awk -v slug="$CONFIG" -v emit_head="$kpi_emit_head" '
              NR==1 { if (emit_head=="1") print "| Config " $0; next }
              NR==2 { if (emit_head=="1") print "|--------" $0; next }
              { print "| " slug " " $0 }
            ' "$KPI_TABLE" >> consolidated/kpi-combined.table
            kpi_emit_head=""
            kpi_config_count=$((kpi_config_count + 1))
          done

          if [ -f consolidated/kpi-combined.table ]; then
            {
              echo "## cuVSLAM Evaluation KPIs"
              echo ""
              cat consolidated/kpi-combined.table
              echo ""
            } >> "$REPORT"
          fi

          report_config_count=0
          for repdir in artifacts/eval-reports/${EVAL_REPORT_ARTIFACT}-*; do
            [ -d "$repdir" ] || continue
            CONFIG=${repdir#artifacts/eval-reports/${EVAL_REPORT_ARTIFACT}-}
            PDF=$(find "$repdir" -name "report_*.pdf" -print -quit 2>/dev/null || true)
            [ -f "$PDF" ] || continue
            mkdir -p "consolidated/eval-reports/$CONFIG"
            cp -a "$repdir"/. "consolidated/eval-reports/$CONFIG/"
            report_config_count=$((report_config_count + 1))
          done

          if [ "$report_config_count" -gt 0 ]; then
            echo "has_reports=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reports=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ needs.build-and-test.result }}" = "success" ]; then
            if [ "$kpi_config_count" -eq 0 ]; then
              echo "::error::Successful matrix produced no KPI artifacts."
              exit 1
            fi
            if [ "$report_config_count" -ne "$kpi_config_count" ]; then
              echo "::error::Expected one PDF report artifact for each KPI configuration; got $report_config_count reports and $kpi_config_count KPI sets."
              exit 1
            fi
          fi

      - name: Upload consolidated evaluation reports
        id: upload-reports
        if: steps.aggregate.outputs.has_reports == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-reports
          path: consolidated/eval-reports/
          retention-days: 30
          if-no-files-found: error

      - name: Append artifact links
        if: needs.check-changes.outputs.should_build == 'true'
        uses: actions/github-script@v7
        env:
          SUMMARY_PATH: consolidated/summary.md
        with:
          script: |
            const fs = require('fs');
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const stagingPrefixes = [
              `${process.env.EVAL_KPIS_ARTIFACT}-`,
              `${process.env.EVAL_REPORT_ARTIFACT}-`,
            ];
            const retained = artifacts
              .filter(a => !stagingPrefixes.some(prefix => a.name.startsWith(prefix)))
              .sort((a, b) => a.name.localeCompare(b.name));
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let markdown = '\n## Artifacts\n\n';
            for (const artifact of retained) {
              markdown += `- [${artifact.name}](${runUrl}/artifacts/${artifact.id})\n`;
            }
            fs.appendFileSync(process.env.SUMMARY_PATH, markdown);

      - name: Upload consolidated CI summary
        id: upload-summary
        if: needs.check-changes.outputs.should_build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ci-summary
          path: |
            consolidated/summary.md
            consolidated/kpi-combined.table
            consolidated/kpis/
          retention-days: 30
          if-no-files-found: error

      - name: Delete KPI and report staging artifacts
        if: always() && steps.upload-summary.outcome == 'success'
        uses: actions/github-script@v7
        env:
          REPORTS_RETAINED: ${{ steps.upload-reports.outcome == 'success' }}
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const prefixes = [`${process.env.EVAL_KPIS_ARTIFACT}-`];
            if (process.env.REPORTS_RETAINED === 'true') {
              prefixes.push(`${process.env.EVAL_REPORT_ARTIFACT}-`);
            }
            for (const artifact of artifacts.filter(a => prefixes.some(prefix => a.name.startsWith(prefix)))) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: Publish workflow summary
        if: always()
        run: |
          if [ -f consolidated/summary.md ]; then
            cat consolidated/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## cuVSLAM CI Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary generation failed. Inspect the job logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check overall result
        if: always()
        run: |
          if [ "${{ needs.check-changes.result }}" != "success" ]; then
            echo "::error::The build preflight job did not succeed: ${{ needs.check-changes.result }}"
            exit 1
          elif [ "${{ needs.check-changes.outputs.should_build }}" = "false" ]; then
            echo "Nightly skipped: no changes in the last 24 hours."
          elif [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "::error::One or more build-and-test matrix jobs did not succeed: ${{ needs.build-and-test.result }}"
            exit 1
          fi

  publish-release:
    name: Create draft release
    runs-on: ubuntu-latest
    if: >-
      always() &&
      needs.check-changes.outputs.is_release == 'true' &&
      needs.build-and-test.result == 'success' &&
      needs.nightly-summary.result == 'success'
    needs: [check-changes, build-and-test, nightly-summary]
    permissions:
      actions: read
      contents: write  # Required by gh release create below.
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Verify release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-changes.outputs.release_tag }}
        run: |
          set -euo pipefail
          existing_release=$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${TAG}\") | [.id, .draft, .html_url] | @tsv"
          )
          if [ -n "$existing_release" ]; then
            echo "::error::A draft or published release already targets ${TAG}. Delete an obsolete draft explicitly before rebuilding; published releases must not be replaced."
            echo "$existing_release"
            exit 1
          fi
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Git tag ${TAG} already exists. Refusing to move or replace it."
            exit 1
          fi

      - name: Package release assets and notes
        env:
          TAG: ${{ needs.check-changes.outputs.release_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p release-assets verification/eval-reports
          library_count=0
          wheel_count=0

          for dir in artifacts/cuvslam-*; do
            [ -d "$dir" ] || continue
            NAME=$(basename "$dir")
            tar czf "release-assets/${NAME}.tar.gz" -C "$dir" .
            library_count=$((library_count + 1))
          done

          for dir in artifacts/pycuvslam-*; do
            [ -d "$dir" ] || continue
            for wheel in "$dir"/*.whl; do
              cp "$wheel" release-assets/
              wheel_count=$((wheel_count + 1))
            done
          done

          if [ "$library_count" -eq 0 ] || [ "$wheel_count" -eq 0 ]; then
            echo "::error::Release packaging requires at least one C++ library archive and one Python wheel."
            exit 1
          fi

          if [ -d artifacts/docs-html ]; then
            tar czf release-assets/docs-html.tar.gz -C artifacts/docs-html .
          fi

          if [ ! -f artifacts/ci-summary/summary.md ] || [ ! -d artifacts/eval-reports ]; then
            echo "::error::Consolidated CI summary or evaluation reports are missing."
            exit 1
          fi
          cp -a artifacts/ci-summary/. verification/
          cp -a artifacts/eval-reports/. verification/eval-reports/
          tar czf "release-assets/cuvslam-evaluation-${TAG}.tar.gz" -C verification .

          cp artifacts/ci-summary/summary.md release-notes.md
          {
            echo ""
            echo "## Permanent evaluation record"
            echo ""
            echo "The attached \`cuvslam-evaluation-${TAG}.tar.gz\` contains the KPI data, combined summary, and PDF evaluation reports used to verify this release."
          } >> release-notes.md

          assets=(release-assets/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets were packaged."
            exit 1
          fi

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check-changes.outputs.release_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)
          draft_url=$(
            gh release create "$TAG" \
              --target "$GITHUB_SHA" \
              --title "cuVSLAM ${TAG}" \
              --notes-file release-notes.md \
              --draft \
              "${assets[@]}"
          )
          {
            echo "## Draft release created"
            echo ""
            echo "[$TAG]($draft_url)"
            echo ""
            echo "To rebuild this release candidate, delete the draft explicitly and dispatch the updated release branch again."
          } >> "$GITHUB_STEP_SUMMARY"
