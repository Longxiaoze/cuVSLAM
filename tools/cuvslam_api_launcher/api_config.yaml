# cuVSLAM API Configuration File Example
# This file can be loaded using --config flag with cuvslam_api_launcher
#
# The config file uses the public API Config structs (Odometry::Config and Slam::Config)
# Command-line flags will override values from this config file.

# =============================================================================
# Odometry Configuration (Odometry::Config)
# =============================================================================
odometry:
  # Multicamera mode: Performance, Precision, or Moderate
  multicam_mode: "Moderate"

  # Odometry mode: Multicamera, Inertial, RGBD, or Mono
  odometry_mode: "Multicamera"

  # Enable tracking using GPU (default: true)
  use_gpu: true

  # Enable SBA asynchronous mode (default: true)
  async_sba: true

  # Enable internal pose prediction mechanism (default: true)
  use_motion_model: true

  # Enable image denoising (default: false)
  # Disable if input images have already passed through a denoising filter
  use_denoising: false

  # Enable fast tracking for rectified stereo cameras (default: false)
  rectified_stereo_camera: false

  # Enable GetLastObservations() export (default: false)
  # Warning: slows down execution and increases memory usage
  enable_observations_export: false

  # Enable GetLastLandmarks() export (default: false)
  # Warning: slows down execution and increases memory usage
  enable_landmarks_export: false

  # Enable GetFinalLandmarks() export (default: false)
  # Also enables observations and landmarks export
  enable_final_landmarks_export: false

  # Maximum frame delta in seconds (default: 1.0)
  # Odometry will warn if time delta between frames exceeds this threshold
  max_frame_delta_s: 1.0

  # Enable IMU debug mode (default: false)
  debug_imu_mode: false

  # RGBD settings (only used when odometry_mode is RGBD)
  rgbd_settings:
    # Depth scale factor (default: 1.0)
    # Divide raw depth values by this factor to get depth in meters
    # E.g., 5000 for TUM RGB-D 16-bit PNG images, 1 for 32-bit float images
    depth_scale_factor: 1.0

    # Depth camera id (default: -1)
    # Specifies which camera the depth image is aligned with
    depth_camera_id: 0

    # Enable stereo 2D tracking between depth-aligned camera and other cameras
    enable_depth_stereo_tracking: false

# =============================================================================
# SLAM Configuration (Slam::Config)
# =============================================================================
slam:
  # Enable GPU use for SLAM (default: true)
  use_gpu: true

  # Synchronous mode - does not run a separate work thread if true (default: false)
  sync_mode: false

  # Enable reading internal data from SLAM (default: false)
  enable_reading_internals: false

  # Planar constraints - camera moves on a horizontal plane (default: false)
  planar_constraints: false

  # Ground truth alignment mode for map building (default: false)
  # Not realtime, no loop closure, no global optimization
  gt_align_mode: false

  # Size of map cell (default: 0, auto-calculated from camera baseline)
  map_cell_size: 0.0

  # Maximum distance from camera to landmark for map inclusion (default: 100m)
  max_landmarks_distance: 100.0

  # Maximum number of poses in SLAM pose graph (default: 300)
  # 0 means unlimited pose-graph
  max_map_size: 300

  # Minimum time interval between loop closure events in ms (default: 0)
  # 1000 is suitable for real-time mapping
  throttling_time_ms: 0

# =============================================================================
# Per-frame Track Options (cuvslam::TrackOptions), optional
# =============================================================================
# Applied on every Odometry::Track() call; unset keys use TrackOptions defaults.
# See src/examples/kitti/kitti_config.yaml for a fuller example.
#
track_options:
  num_desired_tracks: 450
  kf_survivor_from_last: 41
